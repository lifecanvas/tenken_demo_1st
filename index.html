<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消火器点検システム — INOUE WORKS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP','Meiryo',sans-serif;}
body{background:#f0f4f8;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:12px;}
#app{width:100%;max-width:600px;background:#fff;border:0.5px solid #dde3ea;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.hdr{background:#1a3a5c;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.hdr-title{font-size:17px;font-weight:500;}
.hdr-sub{font-size:11px;opacity:0.75;margin-top:2px;}
.hdr-brand{font-size:11px;opacity:0.65;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 10px;background:#f4f6f8;border-bottom:0.5px solid #dde3ea;}
.stat-box{text-align:center;padding:6px 4px;background:#fff;border-radius:8px;border:0.5px solid #dde3ea;}
.stat-n{font-size:20px;font-weight:500;}
.stat-l{font-size:11px;color:#666;margin-top:1px;}
.input-row{display:flex;align-items:stretch;border-bottom:0.5px solid #dde3ea;}
.disp-side{padding:8px 12px;background:#fff;display:flex;flex-direction:column;justify-content:center;border-right:0.5px solid #dde3ea;min-width:130px;}
.disp-label{font-size:11px;color:#888;margin-bottom:3px;}
.disp{font-family:'Courier New',monospace;font-size:28px;font-weight:500;letter-spacing:8px;color:#1a3a5c;}
.msg-side{flex:1;padding:8px 10px;display:flex;align-items:center;}
#msg-box{font-size:13px;line-height:1.5;padding:7px 10px;border-radius:8px;width:100%;min-height:44px;}
.msg-ok{background:#e6f4ea;color:#1e6e2e;}
.msg-warn{background:#fff3cd;color:#856404;}
.msg-err{background:#fde8e8;color:#9b1c1c;}
.msg-done{background:#f0f0f0;color:#666;}
.bottom-area{display:flex;border-bottom:0.5px solid #dde3ea;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:8px;background:#f4f6f8;width:160px;flex-shrink:0;}
.key{background:#fff;border:0.5px solid #c8d0da;border-radius:8px;font-size:22px;font-weight:500;padding:10px 0;cursor:pointer;text-align:center;color:#222;user-select:none;-webkit-tap-highlight-color:transparent;transition:background 0.08s,transform 0.07s;}
.key:active{background:#d8eaf8;transform:scale(0.93);}
.key-del{font-size:16px;color:#666;}
.key-clr{font-size:13px;color:#c0392b;}
.action-side{flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px;padding:8px 10px;border-left:0.5px solid #dde3ea;}
.btn{width:100%;padding:10px 8px;font-size:14px;border-radius:8px;border:0.5px solid #c8d0da;background:#f4f6f8;color:#222;cursor:pointer;font-family:inherit;transition:background 0.1s,transform 0.07s;}
.btn:active{transform:scale(0.97);}
.btn-undo{font-size:13px;color:#666;}
.btn-end{background:#1a3a5c;color:#fff;border-color:#1a3a5c;font-weight:500;}
.tbl-wrap{overflow-y:auto;max-height:360px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f4f6f8;padding:7px 10px;text-align:left;font-weight:500;color:#555;border-bottom:0.5px solid #dde3ea;position:sticky;top:0;}
td{padding:7px 10px;border-bottom:0.5px solid #eee;color:#222;}
tr.done td{color:#bbb;text-decoration:line-through;background:#f9f9f9;}
tr.hit td{background:#e8f4fd;}
.badge{font-size:11px;padding:2px 7px;border-radius:6px;white-space:nowrap;font-weight:500;}
.b-ok{background:#e6f4ea;color:#1e6e2e;}
.b-warn{background:#fff3cd;color:#856404;}
.b-danger{background:#fde8e8;color:#9b1c1c;}
.b-done{background:#f0f0f0;color:#aaa;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;border:0.5px solid #dde3ea;padding:20px;width:90%;max-width:400px;}
.modal-title{font-size:17px;font-weight:500;color:#1a3a5c;margin-bottom:14px;}
.modal p{font-size:14px;line-height:2;color:#222;}
.modal-close{margin-top:16px;width:100%;padding:10px;font-size:14px;font-family:inherit;background:#1a3a5c;color:#fff;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><div class="hdr-title">消火器点検システム</div><div class="hdr-sub">新潟県 架空高校 — 2026年4月</div></div>
    <div class="hdr-brand">INOUE WORKS</div>
  </div>

  <div class="stat-row">
    <div class="stat-box"><div class="stat-n" id="s-done" style="color:#1e6e2e;">0</div><div class="stat-l">点検済み</div></div>
    <div class="stat-box"><div class="stat-n" id="s-remain" style="color:#e65100;">63</div><div class="stat-l">未点検</div></div>
    <div class="stat-box"><div class="stat-n" id="s-warn" style="color:#9b1c1c;">0</div><div class="stat-l">要対応</div></div>
    <div class="stat-box"><div class="stat-n" style="color:#888;">63</div><div class="stat-l">合計</div></div>
  </div>

  <div class="input-row">
    <div class="disp-side">
      <div class="disp-label">下3桁を入力</div>
      <div class="disp" id="disp">_ _ _</div>
    </div>
    <div class="msg-side"><div id="msg-box"></div></div>
  </div>

  <div class="bottom-area">
    <div class="keypad">
      <div class="key" ontouchstart="" onclick="kp('7')">7</div>
      <div class="key" ontouchstart="" onclick="kp('8')">8</div>
      <div class="key" ontouchstart="" onclick="kp('9')">9</div>
      <div class="key" ontouchstart="" onclick="kp('4')">4</div>
      <div class="key" ontouchstart="" onclick="kp('5')">5</div>
      <div class="key" ontouchstart="" onclick="kp('6')">6</div>
      <div class="key" ontouchstart="" onclick="kp('1')">1</div>
      <div class="key" ontouchstart="" onclick="kp('2')">2</div>
      <div class="key" ontouchstart="" onclick="kp('3')">3</div>
      <div class="key key-del" ontouchstart="" onclick="kd()">⌫</div>
      <div class="key" ontouchstart="" onclick="kp('0')">0</div>
      <div class="key key-clr" ontouchstart="" onclick="kc()">CLR</div>
    </div>
    <div class="action-side">
      <button class="btn btn-undo" onclick="undo()">↩ 直前を取り消す</button>
      <button class="btn" onclick="showList()">一覧確認</button>
      <button class="btn btn-end" onclick="showEnd()">点検終了</button>
    </div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead><tr><th>No.</th><th>場所</th><th>番号</th><th>製造年</th><th>状態</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="modal-bg" id="modal-list">
  <div class="modal">
    <div class="modal-title">一覧確認</div>
    <div id="modal-list-body"></div>
    <button class="modal-close" onclick="closeModal('modal-list')">閉じる</button>
  </div>
</div>

<div class="modal-bg" id="modal-end">
  <div class="modal">
    <div class="modal-title">点検終了</div>
    <div id="modal-end-body"></div>
    <button class="modal-close" onclick="closeModal('modal-end')">閉じる</button>
  </div>
</div>

<script>
const Y=2026;
const raw=[
  [1,"1F","教務室前廊下","ハツタ",2018,"141134"],[2,"1F","事務室前廊下","ハツタ",2019,"072625"],
  [3,"1F","印刷用具室内","ハツタ",2018,"141139"],[4,"1F","保健室前廊下","ハツタ",2019,"072675"],
  [5,"1F","技術員室","ハツタ",2018,"141148"],[6,"1F","進路指導室前廊下","ハツタ",2018,"141142"],
  [7,"1F","休養室","ハツタ",2018,"141079"],[8,"1F","購買室前","ハツタ",2018,"141160"],
  [9,"1F","吉商会館","ハツタ",2019,"072661"],[10,"1F","教室棟廊下","ハツタ",2019,"072609"],
  [11,"1F","教室棟廊下","ハツタ",2019,"072564"],[12,"1F","教室棟廊下","ハツタ",2019,"072497"],
  [13,"1F","格技場","ハツタ",2019,"072548"],[14,"1F","屋外危険物","ハツタ",2018,"141138"],
  [15,"1F","屋外危険物","ハツタ",2018,"009862"],[16,"1F","特別教室棟","ハツタ",2019,"012998"],
  [17,"1F","調理室","ハツタ",2019,"072601"],[18,"1F","屋外危険物","ハツタ",2018,"141144"],
  [19,"1F","屋外危険物","ハツタ",2018,"141068"],[20,"1F","実習棟準備室","ハツタ",2019,"072676"],
  [21,"1F","実習棟廊下","ハツタ",2019,"072608"],[22,"1F","実習棟廊下","ハツタ",2019,"072557"],
  [23,"1F","体育館","ハツタ",2019,"072554"],[24,"1F","体育館","ハツタ",2019,"072677"],
  [25,"1F","体育館教官室","ハツタ",2019,"072628"],[26,"1F","体育館ステージ脇","ハツタ",2019,"072611"],
  [27,"1F","講堂","ハツタ",2019,"072669"],[28,"1F","講堂","ハツタ",2019,"072618"],
  [29,"1F","講堂","ハツタ",2019,"072550"],[30,"2F","管理棟廊下","ハツタ",2018,"141158"],
  [31,"2F","化学実習室","ハツタ",2018,"141163"],[32,"2F","化学準備室","ハツタ",2018,"141098"],
  [33,"2F","管理棟廊下","ハツタ",2018,"141097"],[34,"2F","管理棟廊下","ハツタ",2018,"141072"],
  [35,"2F","管理棟廊下","ハツタ",2018,"141077"],[36,"2F","教室棟廊下","ハツタ",2019,"072559"],
  [37,"2F","教室棟廊下","ハツタ",2019,"072655"],[38,"2F","特別棟廊下","ハツタ",2019,"072563"],
  [39,"2F","特別棟廊下","ハツタ",2019,"072659"],[40,"2F","体育館2階","ハツタ",2019,"072653"],
  [41,"2F","体育館2階","ハツタ",2019,"072606"],[42,"2F","講堂","ハツタ",2019,"072656"],
  [43,"2F","講堂","ハツタ",2019,"072610"],[44,"2F","実習棟準備室","ハツタ",2019,"072657"],
  [45,"2F","実習棟廊下","ハツタ",2019,"072624"],[46,"2F","実習棟廊下","ハツタ",2019,"072626"],
  [47,"3F","管理棟廊下","ハツタ",2018,"141086"],[48,"3F","物理実習室","ハツタ",2018,"141140"],
  [49,"3F","物理準備室","ハツタ",2018,"141095"],[50,"3F","管理棟廊下","ハツタ",2018,"140444"],
  [51,"3F","管理棟廊下","ハツタ",2018,"141132"],[52,"3F","教室棟廊下","ハツタ",2019,"072613"],
  [53,"3F","教室棟廊下","ハツタ",2019,"072496"],[54,"3F","特別教室棟廊下","ハツタ",2019,"013138"],
  [55,"3F","特別教室棟廊下","ハツタ",2019,"072604"],[56,"3F","実習棟廊下","ハツタ",2019,"072651"],
  [57,"3F","実習棟準備室","ハツタ",2019,"072660"],[58,"3F","実習棟総合実習室","ハツタ",2019,"072562"],
  [59,"4F","教室棟廊下","ハツタ",2019,"072612"],[60,"4F","教室棟廊下","ハツタ",2019,"072558"],
  [61,"PH","特別教室棟","ハツタ",2019,"072565"],[62,"PH","実習棟","ハツタ",2019,"072555"],
  [63,"PH","実習棟","ハツタ",2019,"072617"]
];
const data=raw.map(r=>({no:r[0],floor:r[1],place:r[2],mfgYear:r[4],serial:r[5],suffix:r[5].slice(-3),done:false}));
let cur="",lastNo=null;

function age(y){return Y-y;}
function badgeHtml(y,done){
  if(done)return '<span class="badge b-done">済</span>';
  const a=age(y);
  if(a>=10)return '<span class="badge b-danger">耐圧必要</span>';
  if(a>=8)return '<span class="badge b-warn">要注意</span>';
  return '<span class="badge b-ok">正常</span>';
}
function render(hlSuffix){
  document.getElementById("tbody").innerHTML=data.map(r=>{
    const isHit=hlSuffix&&r.suffix===hlSuffix&&!r.done;
    const rc=r.done?"done":isHit?"hit":"";
    const sDisp=isHit?r.serial.slice(0,-3)+'<strong style="color:#1a6fce;">'+r.suffix+'</strong>':r.serial;
    return`<tr class="${rc}"${isHit?` onclick="pick(${r.no})" style="cursor:pointer;"`:""}>
      <td>${r.no}</td><td>${r.place}</td>
      <td style="font-family:monospace;">${sDisp}</td>
      <td>${r.mfgYear}</td>
      <td>${badgeHtml(r.mfgYear,r.done)}</td></tr>`;
  }).join("");
  const done=data.filter(r=>r.done).length;
  document.getElementById("s-done").textContent=done;
  document.getElementById("s-remain").textContent=data.length-done;
  document.getElementById("s-warn").textContent=data.filter(r=>!r.done&&age(r.mfgYear)>=10).length;
}
function setDisp(){
  const el=document.getElementById("disp");
  el.textContent=(cur+"___").slice(0,3).split("").join(" ");
  el.style.color=cur.length===3?"#1a3a5c":"#aab";
}
function setMsg(text,cls){
  const el=document.getElementById("msg-box");
  el.textContent=text;el.className=cls||"";
}
function lookup(){
  const hits=data.filter(r=>r.suffix===cur&&!r.done);
  if(!hits.length){
    const already=data.filter(r=>r.suffix===cur&&r.done);
    setMsg(already.length?"No."+already.map(r=>r.no).join("・")+" は点検済みです":"台帳にない番号です",already.length?"msg-done":"msg-err");
    setTimeout(()=>{cur="";setDisp();setMsg("","");render(null);},1800);
    return;
  }
  if(hits.length===1){markDone(hits[0]);return;}
  setMsg(hits.length+"件ヒット — 製造年を確認して行をタップ","msg-warn");
  render(cur);
}
function markDone(r){
  lastNo=r.no;r.done=true;
  const a=age(r.mfgYear);
  setMsg("No."+r.no+" "+r.place+(a>=10?" → 耐圧試験が必要":a>=8?" → 要注意（"+a+"年経過）":" → 点検完了"),a>=10?"msg-err":a>=8?"msg-warn":"msg-ok");
  cur="";setDisp();render(null);
}
function pick(no){const r=data.find(x=>x.no===no);if(r&&!r.done)markDone(r);}
function kp(c){if(cur.length>=3)return;cur+=c;setDisp();if(cur.length===3)lookup();}
function kd(){if(!cur.length)return;cur=cur.slice(0,-1);setDisp();setMsg("","");}
function kc(){cur="";setDisp();setMsg("","");render(null);}
function undo(){
  if(!lastNo)return;
  const r=data.find(x=>x.no===lastNo);
  if(r){r.done=false;lastNo=null;setMsg("取り消しました","msg-done");render(null);}
}
function showList(){
  const undone=data.filter(r=>!r.done);
  document.getElementById("modal-list-body").innerHTML=undone.length===0
    ?'<p>全本の点検が完了しています！</p>'
    :`<p>未点検：${undone.length}本</p><p style="margin-top:8px;font-size:12px;color:#888;">${undone.map(r=>"No."+r.no+" "+r.place).join("　")}</p>`;
  document.getElementById("modal-list").classList.add("open");
}
function showEnd(){
  const done=data.filter(r=>r.done).length;
  const taiatu=data.filter(r=>age(r.mfgYear)>=10).length;
  const yocyu=data.filter(r=>age(r.mfgYear)>=8&&age(r.mfgYear)<10).length;
  const undone=data.length-done;
  document.getElementById("modal-end-body").innerHTML=
    `<p>点検済み：${done}本 ／ 未点検：${undone}本</p>
     <p>耐圧試験が必要：${taiatu}本</p>
     <p>要注意（8年以上）：${yocyu}本</p>`+
    (undone>0
      ?`<p style="margin-top:10px;color:#9b1c1c;font-size:13px;">未点検が${undone}本あります。確認してください。</p>`
      :"<p style='margin-top:10px;color:#1e6e2e;'>全本完了！お疲れ様でした。</p>");
  document.getElementById("modal-end").classList.add("open");
}
function closeModal(id){document.getElementById(id).classList.remove("open");}
render(null);
</script>
</body>
</html>
